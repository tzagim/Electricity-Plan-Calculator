<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון תוכנית חשמל</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: system-ui, Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1250px;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.12);
            padding: 30px;
        }

        .config-section {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 14px 32px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .best {
            background: #d4edda !important;
            font-weight: bold;
            border: 2px solid #28a745;
        }

        .chart-container {
            margin: 35px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>מחשבון תוכנית חשמל</h1>
        <p id="lastUpdated" style="text-align:center;"></p>

        <div class="privacy">🔒הפרטיות שלך חשובה. הכל מתבצע בדפדפן שלך - שום נתון לא נשמר</div>

        <div class="config-section">
            <strong>הטבות מנויים:</strong>
            <label><input type="checkbox" id="check_amisragas"> אמישראגז </label>
            <label><input type="checkbox" id="check_hot"> הוט </label>
        </div>

        <input type="file" id="fileInput" accept=".csv" style="display:none;">
        <button onclick="document.getElementById('fileInput').click()">📤 העלאת קובץ CSV מחברת החשמל</button>

        <div id="results" style="display:none;">
            <h2 id="bestTitle"></h2>
            <table id="plansTable"></table>

            <div class="chart-container">
                <h3>צריכה ממוצע לפי שעות</h3>
                <canvas id="hourlyChart" height="120"></canvas>
            </div>

            <div class="chart-container">
                <h3>צריכה חודשית (קוט"ש)</h3>
                <canvas id="monthlyChart" height="120"></canvas>
            </div>
        </div>
    </div>

    <script>
        // plans.json
        let plans = [];
        let lastUpdated = "";

        async function loadPlans() {
            try {
                const res = await fetch('plans.json');
                const data = await res.json();
                lastUpdated = data.lastUpdated;
                plans = data.plans;
                document.getElementById('lastUpdated').innerHTML =
                    `עדכון אחרון של התוכניות: <strong>${lastUpdated}</strong>`;
            } catch (e) {
                alert('שגיאה בטעינת plans.json – ודא שהקובץ באותו תיקייה');
            }
        }

        let rawData = [];
        let hourlyChartInstance = null;
        let monthlyChartInstance = null;
        let firstDate = null;

        function getDynamicDescription(plan, isMember) {
            const disc = isMember && plan.memberDiscount ? plan.memberDiscount : plan.discount;
            if (plan.type === "base") return "תעריף בסיסי של חברת החשמל ללא הנחה";
            if (plan.type === "flat") {
                const percent = (disc * 100).toFixed(1);
                return `${percent}% הנחה קבועה בכל שעות היממה`;
            }
            if (plan.type === "discount") {
                const percent = (disc * 100).toFixed(1);
                const start = plan.hours.start;
                const end = plan.hours.end;

                let hoursText = (start < end)
                    ? `בין ${start}:00 ל-${end}:00 (יום)`
                    : `בין ${start}:00 ל-${end}:00 (לילה)`;

                let daysText = "";
                if (plan.days && plan.days.length === 5 && plan.days.every(d => d >= 0 && d <= 4)) {
                    daysText = "בימים א'-ה'";
                } else if (plan.days && plan.days.length > 0) {
                    daysText = "בימים מסוימים";
                }

                return `${percent}% הנחה ${hoursText} ${daysText}`.trim();
            }

            if (plan.type === "tou")
                return "תעריף עומס וזמן - שיא ושפל (תעו\"ז)";

            return "";
        }

        function parseCSV(csvText) {
            rawData = [];
            const lines = csvText.split('\n');
            let startRow = -1;

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('תאריך') && lines[i].includes('מועד תחילת הפעימה')) {
                    startRow = i + 1;
                    break;
                }
            }

            if (startRow === -1) {
                alert('לא נמצא מבנה קובץ תקין. ודא שהקובץ הוא מקורי של חברת החשמל.');
                return;
            }

            for (let i = startRow; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));

                if (cols.length < 6) continue;

                const dateStr = cols[2];
                const timeStr = cols[3];
                const consStr = cols[4];

                if (!dateStr || !timeStr || !consStr) continue;

                try {
                    const [day, month, year] = dateStr.split('/').map(Number);
                    const [hour, minute] = timeStr.split(':').map(Number);
                    const consumption = parseFloat(consStr);

                    if (isNaN(day) || isNaN(consumption)) continue;

                    const date = new Date(year, month - 1, day, hour, minute);

                    rawData.push({
                        date: date,
                        cons: consumption,
                        monthKey: `${year}-${String(month).padStart(2, '0')}`
                    });
                } catch (e) { }
            }
        }

        function getRate(plan, date, isMember) {
            const baseRate = plans.find(p => p.id === "iec").baseRate || 0.5451;
            const hour = date.getHours();
            const dayOfWeek = date.getDay();
            let discount = plan.discount || 0;

            // check member discount first
            if (isMember && plan.memberDiscount) {
                discount = plan.memberDiscount;
            }

            // check steps discount
            if (plan.steps && firstDate) {
                const diffMonths = (date.getFullYear() - firstDate.getFullYear()) * 12 + (date.getMonth() - firstDate.getMonth());
                let currentStep = plan.steps[0];
                let monthsAccumulated = 0;
                for (let step of plan.steps) {
                    monthsAccumulated += step.months;
                    if (diffMonths < monthsAccumulated) {
                        currentStep = step;
                        break;
                    }
                    currentStep = step;
                }
                discount = currentStep.discount;
            }

            if (plan.type === "base") return baseRate;
            if (plan.type === "flat") return baseRate * (1 - discount);
            if (plan.type === "discount") {
                const start = plan.hours.start;
                const end = plan.hours.end;
                const inHours = start < end ?
                    (hour >= start && hour < end) :
                    (hour >= start || hour < end);
                const correctDay = plan.days.includes(dayOfWeek);
                return (inHours && correctDay) ? baseRate * (1 - discount) : baseRate;
            }
            if (plan.type === "tou") {
                const month = date.getMonth() + 1;
                let season = "shoulder";
                if ([6, 7, 8, 9].includes(month)) season = "summer";
                else if ([12, 1, 2].includes(month)) season = "winter";

                const r = plan.rates[season];
                const isPeak = hour >= r.peakStart && hour < r.peakEnd;
                return isPeak ? r.peak : r.off;
            }

            return baseRate;
        }

        function calculateAll() {
            const resultsMap = new Map();
            const iecPlan = plans.find(p => p.id === "iec");
            const isAmisragasMember = document.getElementById('check_amisragas').checked;
            const isHotMember = document.getElementById('check_hot').checked;
            let iecCost = 0;

            rawData.forEach(row => { iecCost += row.cons * getRate(iecPlan, row.date); });

            // Find the earliest date in the data to calculate step-based discounts correctly
            if (rawData.length > 0) {
                firstDate = new Date(Math.min(...rawData.map(d => d.date)));
            }

            plans.forEach(plan => {
                const isMember = (plan.id.includes('hot') && isHotMember) || (plan.id.includes('amisragas') && isAmisragasMember);
                let totalCost = 0;
                rawData.forEach(row => { totalCost += row.cons * getRate(plan, row.date, isMember); });

                const conditionKey = plan.type === "flat"
                    ? `flat-${plan.discount}`
                    : plan.type === "discount"
                        ? `dist-${plan.discount}-${plan.hours.start}-${plan.hours.end}-${plan.days.join(',')}`
                        : plan.id;

                if (resultsMap.has(conditionKey)) {
                    const existing = resultsMap.get(conditionKey);
                    existing.names.push(plan.name);
                } else {
                    resultsMap.set(conditionKey, {
                        ...plan,
                        names: [plan.name],
                        cost: totalCost,
                        saving: iecCost - totalCost,
                        description: getDynamicDescription(plan, isMember)
                    });
                }
            });

            const finalResults = Array.from(resultsMap.values());
            finalResults.forEach(r => {
                r.cost = Math.round(r.cost * 100) / 100;
                r.saving = Math.round(r.saving * 100) / 100;
            });
            // sort by cost
            finalResults.sort((a, b) => a.cost - b.cost);
            return finalResults;
        }

        function drawCharts(results) {
            // Graf Hourly
            const hourlySums = { all: new Array(24).fill(0), weekday: new Array(24).fill(0), friday: new Array(24).fill(0), saturday: new Array(24).fill(0) };
            const hourlyCounts = { all: new Array(24).fill(0), weekday: new Array(24).fill(0), friday: new Array(24).fill(0), saturday: new Array(24).fill(0) };

            rawData.forEach(row => {
                const h = row.date.getHours();
                const dow = row.date.getDay();

                hourlySums.all[h] += row.cons;
                hourlyCounts.all[h]++;

                if (dow >= 0 && dow <= 4) { // א-ה
                    hourlySums.weekday[h] += row.cons;
                    hourlyCounts.weekday[h]++;
                } else if (dow === 5) { // שישי
                    hourlySums.friday[h] += row.cons;
                    hourlyCounts.friday[h]++;
                } else if (dow === 6) { // שבת
                    hourlySums.saturday[h] += row.cons;
                    hourlyCounts.saturday[h]++;
                }
            });

            const avgAll = hourlySums.all.map((s, i) => hourlyCounts.all[i] ? s / hourlyCounts.all[i] : 0);
            const avgWeekday = hourlySums.weekday.map((s, i) => hourlyCounts.weekday[i] ? s / hourlyCounts.weekday[i] : 0);
            const avgFriday = hourlySums.friday.map((s, i) => hourlyCounts.friday[i] ? s / hourlyCounts.friday[i] : 0);
            const avgSaturday = hourlySums.saturday.map((s, i) => hourlyCounts.saturday[i] ? s / hourlyCounts.saturday[i] : 0);

            if (hourlyChartInstance) hourlyChartInstance.destroy();
            hourlyChartInstance = new Chart(document.getElementById('hourlyChart'), {
                type: 'line',
                data: {
                    labels: Array.from({ length: 24 }, (_, i) => `${i}:00`),
                    datasets: [
                        { label: 'כל השבוע', data: avgAll, borderColor: '#28a745', tension: 0.3 },
                        { label: 'ימי א-ה', data: avgWeekday, borderColor: '#dc3545', tension: 0.3 },
                        { label: 'שישי', data: avgFriday, borderColor: '#007bff', tension: 0.3 },
                        { label: 'שבת', data: avgSaturday, borderColor: '#6f42c1', tension: 0.3 }
                    ]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });

            // Graf Monthly
            const monthly = {};
            rawData.forEach(r => {
                monthly[r.monthKey] = (monthly[r.monthKey] || 0) + r.cons;
            });

            const sortedKeys = Object.keys(monthly).sort();
            const monthLabels = sortedKeys.map(key => {
                const [y, m] = key.split('-');
                return new Date(y, parseInt(m) - 1).toLocaleDateString('he-IL', { year: 'numeric', month: 'long' });
            });

            if (monthlyChartInstance) monthlyChartInstance.destroy();
            monthlyChartInstance = new Chart(document.getElementById('monthlyChart'), {
                type: 'bar',
                data: {
                    labels: monthLabels,
                    datasets: [{ label: 'סך צריכה חודשית (קוט"ש)', data: sortedKeys.map(k => monthly[k]), backgroundColor: '#1a73e8' }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        document.getElementById('fileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (ev) {
                parseCSV(ev.target.result);
                if (rawData.length === 0) {
                    alert('לא נמצאו נתוני צריכה בקובץ');
                    return;
                }

                const results = calculateAll();
                const best = results[0];

                // Table update
                let html = `<tr><th>תוכנית</th><th>עלות משוערת</th><th>חיסכון לעומת חברת החשמל</th></tr>`;

                results.forEach(r => {
                    const isBest = r.cost === best.cost;
                    const combinedName = r.names.join(' / ');
                    const description = getDynamicDescription(r);

                    html += `<tr class="${isBest ? 'best' : ''}">
                        <td style="text-align: right;">
                            <strong>${combinedName}</strong><br>
                            <small style="color: #666; font-size: 0.92em;">${r.description || ''}</small>
                        </td>
                        <td>₪${r.cost.toFixed(2)}</td>
                        <td>${r.saving > 0 ? '₪' + r.saving.toFixed(2) : '-'}</td>
                    </tr>`;
                });
                document.getElementById('plansTable').innerHTML = html;
                document.getElementById('bestTitle').innerHTML = `התוכנית המומלצת: <strong>${best.names.join(' / ')}</strong> (₪${best.cost.toFixed(2)})`;

                drawCharts(results);
                document.getElementById('results').style.display = 'block';
            };
            reader.readAsText(file);
        });

        loadPlans();
    </script>
</body>

</html>
