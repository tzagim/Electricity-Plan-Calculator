<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון תוכנית חשמל</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: system-ui, Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1250px;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.12);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #1a73e8;
        }

        .privacy {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }

        button {
            padding: 14px 32px;
            font-size: 1.15em;
            margin: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1557b0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
        }

        th,
        td {
            padding: 14px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #f1f3f4;
        }

        .best {
            background: #d4edda !important;
            font-weight: bold;
            border: 2px solid #28a745;
        }

        .chart-container {
            margin: 35px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 10px;
        }

        #lastUpdated {
            color: #555;
            font-size: 1.05em;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>מחשבון תוכנית חשמל</h1>
        <p id="lastUpdated" style="text-align:center;"></p>

        <div class="privacy">🔒הפרטיות שלך חשובה. הכל מתבצע בדפדפן שלך - שום נתון לא נשמר</div>

        <input type="file" id="fileInput" accept=".csv" style="display:none;">
        <button onclick="document.getElementById('fileInput').click()">📤 העלאת קובץ CSV מחברת החשמל</button>

        <div id="results" style="display:none;">
            <h2 id="bestTitle"></h2>
            <table id="plansTable"></table>

            <div class="chart-container">
                <h3>צריכה ממוצע לפי שעות</h3>
                <canvas id="hourlyChart" height="120"></canvas>
            </div>

            <div class="chart-container">
                <h3>צריכה חודשית (קוט"ש)</h3>
                <canvas id="monthlyChart" height="120"></canvas>
            </div>
        </div>
    </div>

    <script>
        // plans.json
        let plans = [];
        let lastUpdated = "";
        let vatRate = 1.18; // VAT multiplier; overridden by plans.json "vat" if present

        async function loadPlans() {
            try {
                const res = await fetch('plans.json');
                const data = await res.json();
                lastUpdated = data.lastUpdated;
                vatRate = data.vat || 1.18;
                plans = data.plans;
                document.getElementById('lastUpdated').innerHTML =
                    `תאריך עדכון אחרון: <strong>${lastUpdated}</strong>`;
            } catch (e) {
                alert('שגיאה בטעינת plans.json – נא לדווח למפתח');
            }
        }

        let rawData = [];
        let hourlyChartInstance = null;
        let monthlyChartInstance = null;

        function getDynamicDescription(plan) {
            if (plan.type === "base") return "תעריף חברת החשמל ללא הנחה";
            if (plan.type === "flat") {
                const percent = (plan.discount * 100).toFixed(1);
                return `${percent}% הנחה קבועה בכל שעות היממה`;
            }
            if (plan.type === "discount") {
                const percent = (plan.discount * 100).toFixed(1);

                let hoursText = "";
                if (!plan.hours || (plan.hours.start === 0 && plan.hours.end === 24)) {
                    hoursText = "בכל שעות היממה";
                } else {
                    const start = plan.hours.start;
                    const end = plan.hours.end;
                    hoursText = (start < end)
                        ? `בין ${start}:00 ל-${end}:00 (יום)`
                        : `בין ${start}:00 ל-${end}:00 (לילה)`;
                }

                let daysText = "";
                if (!plan.days || plan.days.length === 7) {
                    daysText = "כל ימות השבוע";
                } else if (plan.days && plan.days.length === 5 && plan.days.every(d => d >= 0 && d <= 4)) {
                    daysText = "בימים א'-ה'";
                } else if (plan.days && plan.days.length > 0) {
                    daysText = "בימים מסוימים";
                }

                return `${percent}% הנחה ${hoursText} ${daysText}`.trim();
            }

            if (plan.type === "tou")
                return "תעריף עומס וזמן - שיא ושפל";

            return "";
        }

        function parseCSV(csvText) {
            rawData = [];
            const lines = csvText.split('\n');
            let startRow = -1;
            let dateIdx = -1, timeIdx = -1, consIdx = -1, typeIdx = -1;

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('תאריך') && lines[i].includes('מועד תחילת הפעימה')) {
                    // Map columns by header name so the parser is robust to IEC's different export layouts.
                    const hdr = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    dateIdx = hdr.findIndex(c => c.includes('תאריך'));
                    timeIdx = hdr.findIndex(c => c.includes('הפעימה'));
                    consIdx = hdr.findIndex(c => c.includes('צריכה')); // "צריכה בקוט\"ש" or "צריכה/ייצור בקוט\"ש"
                    typeIdx = hdr.findIndex(c => c.includes('סוג מונה'));
                    startRow = i + 1;
                    break;
                }
            }

            if (startRow === -1 || dateIdx === -1 || timeIdx === -1 || consIdx === -1) {
                alert('לא נמצא מבנה קובץ תקין. ודא שהקובץ הוא מקורי של חברת החשמל.');
                return;
            }

            for (let i = startRow; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));

                // Locate the relevant columns by the header row instead of hard-coding indices,
                // so both IEC export formats work: the 3-column file (date,time,kWh) and the
                // 6-column "צריכה/ייצור" file (meter,type,date,time,kWh,feed-in).
                if (cols.length < dateIdx + 1 || cols.length < consIdx + 1) continue;

                // Skip production ("ייצור") rows when a meter-type column exists; only count consumption.
                if (typeIdx >= 0 && cols[typeIdx] && !cols[typeIdx].includes('צריכה')) continue;

                const dateStr = cols[dateIdx];
                const timeStr = cols[timeIdx];
                const consStr = cols[consIdx];

                if (!dateStr || !timeStr || !consStr) continue;

                try {
                    const [day, month, year] = dateStr.split('/').map(Number);
                    const [hour, minute] = timeStr.split(':').map(Number);
                    const consumption = parseFloat(consStr);

                    if (isNaN(day) || isNaN(month) || isNaN(year) || isNaN(hour) || isNaN(minute) || isNaN(consumption)) continue;

                    const date = new Date(year, month - 1, day, hour, minute);

                    rawData.push({
                        date: date,
                        cons: consumption,
                        monthKey: `${year}-${String(month).padStart(2, '0')}`
                    });
                } catch (e) { }
            }
        }

        function getRate(plan, date) {
            // baseRate in plans.json is the published EX-VAT energy tariff; the תעו"ז (tou) rates
            // are already VAT-inclusive. Multiply the ex-VAT rates by vatRate so every plan is
            // compared on one VAT-inclusive basis and the ₪ figures match the real bill.
            const baseRate = (plans.find(p => p.id === "iec").baseRate || 0.5451) * vatRate;
            const hour = date.getHours();
            const dayOfWeek = date.getDay();

            if (plan.type === "base") return baseRate;
            if (plan.type === "flat") return baseRate * (1 - (plan.discount || 0));

            if (plan.type === "discount") {
                const start = plan.hours.start;
                const end = plan.hours.end;
                let inHours = false;

                if (start < end) {
                    inHours = hour >= start && hour < end;
                } else { // overnight
                    inHours = hour >= start || hour < end;
                }

                const correctDay = !plan.days || plan.days.includes(dayOfWeek);
                return (inHours && correctDay) ? baseRate * (1 - plan.discount) : baseRate;
            }

            if (plan.type === "tou") {
                const month = date.getMonth() + 1;
                let season = "shoulder";
                if ([6, 7, 8, 9].includes(month)) season = "summer";
                else if ([12, 1, 2].includes(month)) season = "winter";

                const r = plan.rates[season];
                // Peak (פסגה) never applies on Fri (5) / Sat (6): Shabbat, Fri & holiday-eves are
                // off-peak. tou rates are already VAT-inclusive, so no vatRate multiplier here.
                const isPeak = dayOfWeek !== 5 && dayOfWeek !== 6 && hour >= r.peakStart && hour < r.peakEnd;
                return isPeak ? r.peak : r.off;
            }

            return baseRate;
        }

        function calculateAll() {
            const resultsMap = new Map();
            const iecPlan = plans.find(p => p.id === "iec");

            let iecCost = 0;
            rawData.forEach(row => { iecCost += row.cons * getRate(iecPlan, row.date); });

            plans.forEach(plan => {
                let totalCost = 0;
                rawData.forEach(row => { totalCost += row.cons * getRate(plan, row.date); });

                const conditionKey = plan.type === "flat"
                    ? `flat-${plan.discount}`
                    : plan.type === "discount"
                        ? `dist-${plan.discount}-${plan.hours.start}-${plan.hours.end}-${(plan.days || [0, 1, 2, 3, 4, 5, 6]).join(',')}`
                        : plan.id;

                if (resultsMap.has(conditionKey)) {
                    const existing = resultsMap.get(conditionKey);
                    existing.names.push(plan.name);
                } else {
                    resultsMap.set(conditionKey, {
                        ...plan,
                        names: [plan.name],
                        cost: totalCost,
                        saving: iecCost - totalCost,
                        description: getDynamicDescription(plan)
                    });
                }
            });

            const finalResults = Array.from(resultsMap.values());
            finalResults.forEach(r => {
                r.cost = Math.round(r.cost * 100) / 100;
                r.saving = Math.round(r.saving * 100) / 100;
            });
            // sort by cost
            finalResults.sort((a, b) => a.cost - b.cost);
            return finalResults;
        }

        function drawCharts(results) {
            // Graf Hourly — average kWh actually consumed during each hour-of-day.
            // Divide the summed kWh by the number of DISTINCT DAYS observed at that hour
            // (not the number of 15-min readings), so the value is real average hourly consumption.
            const hourlySums = { all: new Array(24).fill(0), weekday: new Array(24).fill(0), friday: new Array(24).fill(0), saturday: new Array(24).fill(0) };
            const hourlyDays = { all: Array.from({ length: 24 }, () => new Set()), weekday: Array.from({ length: 24 }, () => new Set()), friday: Array.from({ length: 24 }, () => new Set()), saturday: Array.from({ length: 24 }, () => new Set()) };

            rawData.forEach(row => {
                const h = row.date.getHours();
                const dow = row.date.getDay();
                const dayKey = `${row.monthKey}-${row.date.getDate()}`;

                hourlySums.all[h] += row.cons;
                hourlyDays.all[h].add(dayKey);

                if (dow >= 0 && dow <= 4) { // א-ה
                    hourlySums.weekday[h] += row.cons;
                    hourlyDays.weekday[h].add(dayKey);
                } else if (dow === 5) { // שישי
                    hourlySums.friday[h] += row.cons;
                    hourlyDays.friday[h].add(dayKey);
                } else if (dow === 6) { // שבת
                    hourlySums.saturday[h] += row.cons;
                    hourlyDays.saturday[h].add(dayKey);
                }
            });

            const avgAll = hourlySums.all.map((s, i) => hourlyDays.all[i].size ? s / hourlyDays.all[i].size : 0);
            const avgWeekday = hourlySums.weekday.map((s, i) => hourlyDays.weekday[i].size ? s / hourlyDays.weekday[i].size : 0);
            const avgFriday = hourlySums.friday.map((s, i) => hourlyDays.friday[i].size ? s / hourlyDays.friday[i].size : 0);
            const avgSaturday = hourlySums.saturday.map((s, i) => hourlyDays.saturday[i].size ? s / hourlyDays.saturday[i].size : 0);

            if (hourlyChartInstance) hourlyChartInstance.destroy();
            hourlyChartInstance = new Chart(document.getElementById('hourlyChart'), {
                type: 'line',
                data: {
                    labels: Array.from({ length: 24 }, (_, i) => `${i}:00`),
                    datasets: [
                        { label: 'כל השבוע', data: avgAll, borderColor: '#28a745', tension: 0.3 },
                        { label: 'ימי חול', data: avgWeekday, borderColor: '#dc3545', tension: 0.3 },
                        { label: 'שישי', data: avgFriday, borderColor: '#007bff', tension: 0.3 },
                        { label: 'שבת', data: avgSaturday, borderColor: '#6f42c1', tension: 0.3 }
                    ]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });

            // Graf Monthly
            const monthly = {};
            rawData.forEach(r => {
                monthly[r.monthKey] = (monthly[r.monthKey] || 0) + r.cons;
            });

            const sortedKeys = Object.keys(monthly).sort();
            const monthLabels = sortedKeys.map(key => {
                const [y, m] = key.split('-');
                return new Date(y, parseInt(m) - 1).toLocaleDateString('he-IL', { year: 'numeric', month: 'long' });
            });

            if (monthlyChartInstance) monthlyChartInstance.destroy();
            monthlyChartInstance = new Chart(document.getElementById('monthlyChart'), {
                type: 'bar',
                data: {
                    labels: monthLabels,
                    datasets: [{ label: 'סך צריכה חודשית (קוט"ש)', data: sortedKeys.map(k => monthly[k]), backgroundColor: '#1a73e8' }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        document.getElementById('fileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (ev) {
                // Decode as UTF-8 first; fall back to Windows-1255 for legacy Hebrew exports
                // whose header would otherwise be mojibake and fail detection.
                let text = new TextDecoder('utf-8').decode(ev.target.result);
                if (!text.includes('מועד תחילת הפעימה')) {
                    try { text = new TextDecoder('windows-1255').decode(ev.target.result); } catch (e) { }
                }
                parseCSV(text);
                if (rawData.length === 0) {
                    alert('לא נמצאו נתוני צריכה בקובץ');
                    return;
                }

                const results = calculateAll();
                const best = results[0];

                // Table update
                let html = `<tr><th>תוכנית</th><th>עלות משוערת</th><th>חיסכון לעומת חברת החשמל</th></tr>`;

                results.forEach(r => {
                    const isBest = r.cost === best.cost;
                    const combinedName = r.names.join(' / ');
                    const description = getDynamicDescription(r);

                    html += `<tr class="${isBest ? 'best' : ''}">
                        <td style="text-align: right;">
                            <strong>${combinedName}</strong><br>
                            <small style="color: #666; font-size: 0.92em;">${r.description || ''}</small>
                        </td>
                        <td>₪${r.cost.toFixed(2)}</td>
                        <td>${r.saving > 0 ? '₪' + r.saving.toFixed(2) : '-'}</td>
                    </tr>`;
                });
                document.getElementById('plansTable').innerHTML = html;
                document.getElementById('bestTitle').innerHTML = `התוכנית המומלצת היא: <strong>${best.names.join(' / ')}</strong>`;

                drawCharts(results);
                document.getElementById('results').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        });

        loadPlans();
    </script>
</body>

</html>
